<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam's House — Create Account</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[var(--bg)] min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md">
    <a href="home.html" class="flex items-center justify-center gap-2 mb-10">
      <img src="photos/logo_1.png" alt="Logo" class="w-70 h-16 object-cover">
    </a>

    <div class="bg-[var(--bg-alt)] border border-[var(--border)] p-8">
      <h1 class="font-display text-2xl mb-2">Create Account</h1>
      <p class="text-sm text-[var(--muted)] mb-8">Register to place orders and track your purchases.</p>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="mb-4">
          <label class="form-label" for="register-name">Full Name</label>
          <input type="text" id="register-name" class="dash-input" required placeholder="Your full name" autocomplete="name">
        </div>
        <div class="mb-4">
          <label class="form-label" for="register-phone">Phone</label>
          <input type="tel" id="register-phone" class="dash-input" required placeholder="01xxxxxxxxx" autocomplete="tel">
        </div>
        <div class="mb-4">
          <label class="form-label" for="register-email">Email</label>
          <input type="email" id="register-email" class="dash-input" required placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="mb-4">
          <label class="form-label" for="register-password">Password</label>
          <input type="password" id="register-password" class="dash-input" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="mb-6">
          <label class="form-label" for="register-confirm">Confirm Password</label>
          <input type="password" id="register-confirm" class="dash-input" required minlength="6" placeholder="Repeat your password" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary w-full justify-center">
          <span>Create Account</span>
          <i class="fa-solid fa-user-plus"></i>
        </button>
      </form>

      <p class="text-center text-sm text-[var(--muted)] mt-6">
        Already have an account?
        <a id="signin-link" href="customer-login.html" class="text-[var(--accent)] font-semibold hover:underline">Sign in</a>
      </p>
    </div>

    <p class="text-center text-sm text-[var(--muted)] mt-6">
      <a href="home.html" class="hover:text-[var(--accent)]">← Back to showroom</a>
    </p>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
    document.getElementById('signin-link').href = authLink('customer-login.html');

    async function handleRegister(e) {
      e.preventDefault();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }
      const result = await registerCustomer({
        name: document.getElementById('register-name').value.trim(),
        phone: document.getElementById('register-phone').value.trim(),
        email: document.getElementById('register-email').value.trim().toLowerCase(),
        password
      });
      if (!result.ok) {
        alert(result.error);
        return;
      }
      window.location.href = getReturnUrl();
    }
  </script>
  <script src="js/translate.js"></script>
</body>
</html>
