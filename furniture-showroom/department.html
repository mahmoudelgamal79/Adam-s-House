<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam's House — Collection</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="department-page bg-[var(--bg)]">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-[var(--bg)]/85 backdrop-blur-md border-b border-[var(--border)]/50">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-12 py-5 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-2">
        <img src="photos/logo_1.png" alt="Logo" class="w-70 h-12 object-cover">
      </a>
      <div class="hidden lg:flex items-center gap-10 text-sm font-medium">
        <a href="home.html#categories" class="nav-link">Collections</a>
        <a href="home.html#offers" class="nav-link">Offers</a>
        <a href="home.html#visit" class="nav-link">Contact</a>
      </div>
      <div class="flex items-center gap-4">
        <a href="cart.html" class="relative text-xl hover:text-[var(--accent)] transition-colors nav-icon-btn" title="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="absolute -top-2 -right-2 bg-[var(--accent)] text-[var(--fg-light)] text-[10px] w-4 h-4 rounded-full flex items-center justify-center cart-count">0</span>
        </a>
        <a href="customer-login.html" data-login-link class="hidden md:flex text-sm font-semibold uppercase tracking-wide text-[var(--accent)]">Sign In</a>
        <a href="customer-login.html" data-user-link class="nav-icon-btn text-xl hover:text-[var(--accent)] transition-colors" title="Sign in">
          <i class="fa-solid fa-circle-user"></i>
        </a>
        <button id="mobile-menu-btn" class="lg:hidden text-xl"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>
    <div id="mobile-menu" class="mobile-menu fixed top-0 right-0 h-screen w-1/2 bg-[var(--bg)] border-l border-[var(--border)] p-6 lg:hidden flex flex-col gap-6">
      <button class="self-end text-2xl" onclick="document.getElementById('mobile-menu').classList.remove('open')"><i class="fa-solid fa-xmark"></i></button>
      <a href="home.html#categories" class="text-xl font-display" onclick="document.getElementById('mobile-menu').classList.remove('open')">Collections</a>
      <a href="home.html#offers" class="text-xl font-display" onclick="document.getElementById('mobile-menu').classList.remove('open')">Offers</a>
      <a href="home.html#visit" class="text-xl font-display" onclick="document.getElementById('mobile-menu').classList.remove('open')">Contact</a>
    </div>
  </nav>

  <section class="pt-40 pb-16 bg-[var(--bg-alt)] relative grain">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-12 relative z-10">
      <div class="flex items-center gap-3 mb-6 text-sm">
        <a href="home.html" class="text-[var(--muted)] hover:text-[var(--accent)]">Home</a>
        <i class="fa-solid fa-chevron-right text-[10px] text-[var(--muted)]"></i>
        <span id="breadcrumb-cat" class="text-[var(--fg)] font-medium">Collection</span>
      </div>
      <h1 id="dept-title" class="font-display text-5xl lg:text-7xl font-light leading-tight mb-4">Loading...</h1>
      <p id="dept-desc" class="text-lg text-[var(--muted)] max-w-2xl leading-relaxed"></p>
    </div>
  </section>

  <section class="py-16 lg:py-24">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-12">
      <!--
        LEGACY: This page is built by JavaScript (js/main.js).
        For editable HTML pages, use the files in the /categories folder instead.
        Example: categories/childrens-rooms.html
      -->
      <div id="dept-products-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
  </section>

  <footer class="bg-[var(--bg-dark)] text-[var(--fg-light)] py-12 relative grain">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-12 text-center text-sm text-[var(--muted-light)]">
      © 2026 Adam's House · Alexandria, Sidi Bishr Qebli, 181 Gamal Abd El-Nasir · 01123415353
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/translate.js"></script>
</body>
</html>
