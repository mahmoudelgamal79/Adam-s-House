<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam's House — Welcome</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="welcome-page bg-[var(--bg-dark)] text-[var(--fg-light)] overflow-hidden">

  <div class="fixed inset-0 grain z-0"></div>
  <div class="fixed inset-0 opacity-20 z-0">
    <img src="photos/1.jpeg" class="w-full h-full object-cover" alt="">
  </div>

  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-6">
    <div class="welcome-content opacity-0 transform translate-y-8 transition-all duration-1000">
      <div class="flex items-center justify-center gap-2 mb-8">
        <img src="photos/logo_1.png" alt="Logo" class="w-70 h-32 object-cover">
      </div>
      <p class="text-xs uppercase tracking-[0.4em] text-[var(--accent-light)] mb-6">Alexandria · Since 2010</p>
      <h1 class="font-display text-[clamp(3rem,12vw,9rem)] font-light leading-none mb-4">
        Adam's <span class="font-display-italic">House</span>
      </h1>
      <p class="text-lg md:text-xl text-[var(--muted-light)] max-w-xl mx-auto mb-12 font-light leading-relaxed">
        Fine furniture for every room. Explore seven curated collections — from large bedrooms to display cabinets — crafted with care in Alexandria.
      </p>
      <a href="home.html" class="btn-primary">
        <span>Enter Showroom</span>
        <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
  </main>

  <script>
    setTimeout(() => {
      document.querySelector('.welcome-content').classList.remove('opacity-0', 'translate-y-8');
    }, 100);
  </script>
</body>
</html>
