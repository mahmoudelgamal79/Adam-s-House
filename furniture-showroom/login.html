<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam's House — Manager Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[var(--bg-dark)] text-[var(--fg-light)] min-h-screen flex items-center justify-center p-6 relative grain">

  <div class="w-full max-w-md relative z-10">
    <a href="home.html" class="flex items-center justify-center gap-2 mb-10">
      <img src="photos/logo_1.png" alt="Logo" class="w-70 h-12 object-cover">
    </a>

    <div class="bg-[var(--bg-dark-alt)] border border-[var(--border-dark)] p-8 rounded">
      <div class="flex items-center gap-2 mb-2">
        <i class="fa-solid fa-shield-halved text-[var(--accent-light)]"></i>
        <h1 class="font-display text-2xl">Manager Portal</h1>
      </div>
      <p class="text-sm text-[var(--muted-light)] mb-8">Restricted access. Sign in to manage products, orders, and showroom settings.</p>

      <div id="lock-msg" class="hidden mb-4 text-red-400 text-sm text-center font-semibold"></div>

      <form onsubmit="login(event)">
        <div class="mb-4">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="dash-input dark" required autocomplete="username">
        </div>
        <div class="mb-6">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="dash-input dark" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="btn-primary w-full justify-center">
          <span>Sign In</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-[var(--muted-light)] mt-6">
      <a href="home.html" class="hover:text-[var(--accent-light)]">← Back to showroom</a>
    </p>
  </div>

  <script src="js/data.js"></script>
  <script>
    // ── Manager credentials ────────────────────────────────────────────────
    // MANAGER_USERNAME and MANAGER_PASSWORD_HASH are defined in js/data.js
    // To change the password: run this in the browser console to get the new hash:
    //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('new_password'))
    //     .then(b => console.log(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')))

    // ── Rate limiting for manager login ────────────────────────────────────
    const MGR_LOCK_KEY  = 'adams-house-mgr-lock';
    const MAX_ATTEMPTS  = 5;
    const LOCKOUT_MS    = 15 * 60 * 1000;

    function checkManagerLock() {
      const data = JSON.parse(localStorage.getItem(MGR_LOCK_KEY) || '{}');
      if (data.lockedUntil && Date.now() < data.lockedUntil) {
        const mins = Math.ceil((data.lockedUntil - Date.now()) / 60000);
        return `Too many failed attempts. Try again in ${mins} minute(s).`;
      }
      return null;
    }

    function recordManagerFail() {
      const data = JSON.parse(localStorage.getItem(MGR_LOCK_KEY) || '{}');
      data.attempts = (data.attempts || 0) + 1;
      if (data.attempts >= MAX_ATTEMPTS) {
        data.lockedUntil = Date.now() + LOCKOUT_MS;
        data.attempts = 0;
      }
      localStorage.setItem(MGR_LOCK_KEY, JSON.stringify(data));
    }

    function clearManagerLock() {
      localStorage.removeItem(MGR_LOCK_KEY);
    }

    // Redirect only if token exists AND has not expired (8-hour session)
    const SESSION_MAX_MS = 8 * 60 * 60 * 1000;
    (function () {
      const token = localStorage.getItem(MANAGER_AUTH_KEY);
      if (!token || !/^[0-9a-f]{64}-\d+$/.test(token)) return;
      const timestamp = parseInt(token.split('-').pop(), 10);
      if (isNaN(timestamp) || Date.now() - timestamp > SESSION_MAX_MS) {
        localStorage.removeItem(MANAGER_AUTH_KEY);
        return;
      }
      window.location.href = 'dashboard.html';
    })();

    // ── Login handler ──────────────────────────────────────────────────────
    async function login(e) {
      e.preventDefault();

      const lockMsg = checkManagerLock();
      if (lockMsg) {
        showLockMsg(lockMsg);
        return;
      }

      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;

      const encoder  = new TextEncoder();
      const hashBuf  = await crypto.subtle.digest('SHA-256', encoder.encode(p));
      const hashed   = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

      if (u === MANAGER_USERNAME && hashed === MANAGER_PASSWORD_HASH) {
        clearManagerLock();
        // Store a signed session token (hash + timestamp) — not a plain 'true'
        localStorage.setItem(MANAGER_AUTH_KEY, `${hashed}-${Date.now()}`);
        window.location.href = 'dashboard.html';
      } else {
        recordManagerFail();
        const msg = checkManagerLock();
        showLockMsg(msg || 'Invalid credentials.');
      }
    }

    function showLockMsg(msg) {
      const el = document.getElementById('lock-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
